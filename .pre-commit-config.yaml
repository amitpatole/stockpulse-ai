# Pre-commit hooks configuration
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # ==========================================================================
  # General checks
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML syntax
        args: ['--unsafe']
      - id: check-json
        name: Check JSON syntax
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-case-conflict
        name: Check for case conflicts in filenames
      - id: check-docstring-first
        name: Check docstring is first
      - id: debug-statements
        name: Detect debug statements
      - id: detect-private-key
        name: Detect private keys
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ['--fix=lf']

  # ==========================================================================
  # Python: Code formatting with Black
  # ==========================================================================
  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black
        name: Format code with Black
        language_version: python3.11
        args: ['--line-length=120']

  # ==========================================================================
  # Python: Import sorting with isort
  # ==========================================================================
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: Sort imports with isort
        args: ['--profile=black']

  # ==========================================================================
  # Python: Linting with flake8
  # ==========================================================================
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        name: Lint with flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear
          - flake8-comprehensions

  # ==========================================================================
  # Python: Type checking with mypy
  # ==========================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.0
    hooks:
      - id: mypy
        name: Type check with mypy
        args: ['--ignore-missing-imports', '--allow-untyped-defs']
        additional_dependencies:
          - types-requests
          - types-flask
        files: ^backend/
        exclude: tests/

  # ==========================================================================
  # Python: Security checks with bandit
  # ==========================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Security check with bandit
        args: ['-c', '.bandit', '--severity-level=medium']
        exclude: tests/

  # ==========================================================================
  # JavaScript/TypeScript: Prettier code formatting
  # ==========================================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.2
    hooks:
      - id: prettier
        name: Format code with Prettier
        types: [javascript, typescript, jsx, tsx, json, markdown]
        args: ['--write', '--parser=typescript']

  # ==========================================================================
  # JavaScript: ESLint linting
  # ==========================================================================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.50.0
    hooks:
      - id: eslint
        name: Lint with ESLint
        types: [javascript, typescript, jsx, tsx]
        additional_dependencies:
          - eslint
          - eslint-config-next
          - @typescript-eslint/eslint-plugin
          - @typescript-eslint/parser

  # ==========================================================================
  # YAML: Check syntax and formatting
  # ==========================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.32.0
    hooks:
      - id: yamllint
        name: Lint YAML
        args: ['-d', '{rules: {line-length: {max: 120}}}']
        types: [yaml]

  # ==========================================================================
  # Secrets: Detect secrets and credentials
  # ==========================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']

  # ==========================================================================
  # Secrets: GitLeaks (alternative secret scanner)
  # ==========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        name: Detect secrets with GitLeaks
        entry: gitleaks protect --verbose --redact
        language: golang
        stages: [commit]

  # ==========================================================================
  # Git: Commit message format
  # ==========================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: 3.12.0
    hooks:
      - id: commitizen
        name: Check commit message format
        stages: [commit-msg]

  # ==========================================================================
  # Documentation: Check markdown
  # ==========================================================================
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.12.0
    hooks:
      - id: markdownlint
        name: Lint Markdown
        args: ['--fix']
        types: [markdown]

# =============================================================================
# Global settings
# =============================================================================

# Exclude certain patterns from all hooks
exclude: |
  (?x)^(
    node_modules/|
    venv/|
    .venv/|
    build/|
    dist/|
    \.egg-info/|
    frontend/.next/|
    __pycache__/|
    \.pytest_cache/
  )
