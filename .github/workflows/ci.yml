name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Stage 1: Fast validation (lint + type check)
  # ============================================================================
  lint-backend:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy pylint
          pip install -r requirements.txt

      - name: Check formatting with Black
        run: black --check backend/ --line-length=120

      - name: Check import sorting with isort
        run: isort --check-only backend/

      - name: Type check with mypy
        run: |
          mypy backend/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

      - name: Lint with flake8
        run: flake8 backend/ --max-line-length=120 --extend-ignore=E203,W503 --count --show-source

  lint-frontend:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint 2>&1 || true
        continue-on-error: true

      - name: Type check with TypeScript
        run: |
          cd frontend
          npx tsc --noEmit 2>&1 || true
        continue-on-error: true

  # ============================================================================
  # Stage 2: Testing (unit + integration)
  # ============================================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          PYTHONPATH=. python -m pytest backend/tests/ \
            -v \
            --tb=short \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=30
        continue-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  test-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Vitest unit tests
        run: |
          cd frontend
          npm run test:unit -- --run
        timeout-minutes: 10
        continue-on-error: false

  # ============================================================================
  # Stage 3: E2E Tests (PR only)
  # ============================================================================
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [ test-backend, test-frontend ]
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Node dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend server
        run: |
          python backend/app.py > server.log 2>&1 &
          sleep 3
          # Wait for server to be ready (Flask runs on port 5000 by default)
          timeout 30 bash -c 'until curl -s http://localhost:5000/health > /dev/null 2>&1; do sleep 1; done' || (cat server.log && exit 1)
        env:
          FLASK_ENV: testing

      - name: Run Playwright E2E tests
        run: |
          cd frontend
          npm run test:e2e
        timeout-minutes: 10
        continue-on-error: false

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ============================================================================
  # Stage 4: Build artifacts
  # ============================================================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python syntax
        run: |
          python -m py_compile backend/**/*.py || true

      - name: Check for import errors
        run: |
          PYTHONPATH=. python -c "import backend.app; import backend.database"
        continue-on-error: true

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js
        run: |
          cd frontend
          npm run build

      - name: Check build output
        run: |
          if [ -d "frontend/.next" ]; then
            echo "✅ Next.js build successful"
            du -sh frontend/.next
          else
            echo "❌ Next.js build failed - .next directory not found"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 7

  # ============================================================================
  # Security: Secret Detection
  # ============================================================================
  secrets-scan:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ============================================================================
  # Status check
  # ============================================================================
  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [
      lint-backend,
      lint-frontend,
      test-backend,
      test-frontend,
      build-backend,
      build-frontend,
      secrets-scan
    ]
    if: always()

    steps:
      - name: Check CI status
        run: |
          echo "## CI Pipeline Status"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Backend Lint | ${{ needs.lint-backend.result }} |"
          echo "| Frontend Lint | ${{ needs.lint-frontend.result }} |"
          echo "| Backend Tests | ${{ needs.test-backend.result }} |"
          echo "| Frontend Tests | ${{ needs.test-frontend.result }} |"
          echo "| Backend Build | ${{ needs.build-backend.result }} |"
          echo "| Frontend Build | ${{ needs.build-frontend.result }} |"
          echo "| Secrets Scan | ${{ needs.secrets-scan.result }} |"
          echo ""

          # Fail if any required job failed
          if [ "${{ needs.lint-backend.result }}" = "failure" ] || \
             [ "${{ needs.lint-frontend.result }}" = "failure" ] || \
             [ "${{ needs.test-backend.result }}" = "failure" ] || \
             [ "${{ needs.test-frontend.result }}" = "failure" ] || \
             [ "${{ needs.build-backend.result }}" = "failure" ] || \
             [ "${{ needs.build-frontend.result }}" = "failure" ] || \
             [ "${{ needs.secrets-scan.result }}" = "failure" ]; then
            echo "❌ CI Pipeline FAILED"
            exit 1
          else
            echo "✅ CI Pipeline PASSED"
            exit 0
          fi
